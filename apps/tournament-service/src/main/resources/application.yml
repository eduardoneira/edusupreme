spring:
  application:
    name: tournament-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/edusupreme}
    username: ${SPRING_DATASOURCE_USERNAME:edusupreme}
    password: ${SPRING_DATASOURCE_PASSWORD:edusupreme_dev_password}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
