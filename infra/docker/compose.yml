name: edusupreme

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edusupreme}
      POSTGRES_USER: ${POSTGRES_USER:-edusupreme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edusupreme_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edusupreme} -d ${POSTGRES_DB:-edusupreme}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
